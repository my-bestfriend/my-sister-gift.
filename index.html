<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Birthday Memory Book</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
}

.scene {
    width: 90vw;
    max-width: 900px;
    height: 550px;
    perspective: 3000px;
    position: relative;
}

input { display: none; }

.book {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
}

.page {
    width: 50%;
    height: 100%;
    position: absolute;
    right: 0;
    transform-origin: left;
    transform-style: preserve-3d;
    transition: transform 1.3s cubic-bezier(.65, .02, .36, 1);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 5px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.back { transform: rotateY(180deg); background: white; }

.left-side {
    position: absolute;
    width: 50%;
    height: 100%;
    left: 0;
    background: white;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 5px 0 0 5px;
}

.left-side img, .back img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background-color: white;
}

.color1{background: linear-gradient(135deg,#ffecd2,#fcb69f);}
.color2{background: linear-gradient(135deg,#a18cd1,#fbc2eb);}
.color3{background: linear-gradient(135deg,#fad0c4,#ffd1ff);}
.color4{background: linear-gradient(135deg,#ff9a9e,#fecfef);}
.color5{background: linear-gradient(135deg,#f6d365,#fda085);}

.message { padding: 30px; text-align: center; }
.message h1 { font-size: 1.8rem; margin-bottom: 15px; }
label {
    margin-top: 25px;
    display: inline-block;
    padding: 10px 25px;
    background: #ff4e50;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    user-select: none;
}

/* --- Z-INDEX LOGIC --- */
#p1 { z-index: 5; }
#p2 { z-index: 4; }
#p3 { z-index: 3; }
#p4 { z-index: 2; }
#p5 { z-index: 1; }

#c1:checked ~ .scene #p1 { transform: rotateY(-180deg); z-index: 1; }
#c2:checked ~ .scene #p2 { transform: rotateY(-180deg); z-index: 2; }
#c3:checked ~ .scene #p3 { transform: rotateY(-180deg); z-index: 3; }
#c4:checked ~ .scene #p4 { transform: rotateY(-180deg); z-index: 4; }
#c5:checked ~ .scene #p5 { transform: rotateY(-180deg); z-index: 5; }
</style>
</head>

<body>

<input type="checkbox" id="c1">
<input type="checkbox" id="c2">
<input type="checkbox" id="c3">
<input type="checkbox" id="c4">
<input type="checkbox" id="c5">

<div class="scene">
    <div class="book">

        <div class="left-side">
            <img src="Whitecolor.jpg">
        </div>

        <div class="page" id="p1">
            <div class="front color1">
                <div class="message">
                    <h1>🎉 Happy Birthday 🎂</h1>
                    <p>Ready for the memories?</p>
                    <label for="c1">Open ➜</label>
                </div>
            </div>
            <div class="back">
                <img src="Birthdayto.jpg">
            </div>
        </div>

        <div class="page" id="p2">
            <div class="front color2">
                <div class="message">
                    <h1>🌟 Special Wishes</h1>
                    <p>To the best sister!</p>
                    <label for="c2">Next ➜</label>
                </div>
            </div>
            <div class="back">
                <img src="Mysisterhappy.jpg">
            </div>
        </div>

        <div class="page" id="p3">
            <div class="front color3">
                <div class="message">
                    <h1>💖 Precious Memories</h1>
                    <p>Every moment with you is unforgettable.</p>
                    <label for="c3">Next ➜</label>
                </div>
            </div>
            <div class="back">
                <img src="Goodsis.jpg">
            </div>
        </div>

        <div class="page" id="p4">
            <div class="front color4">
                <div class="message">
                    <h1>✨ Keep Shining</h1>
                    <p>You deserve the best in life.</p>
                    <label for="c4">Next ➜</label>
                </div>
            </div>
            <div class="back">
                <img src="Shadi.jpg">
            </div>
        </div>

        <div class="page" id="p5">
            <div class="front color5">
                <div class="message">
                    <h1>🎁 Celebrate Big</h1>
                    <p>May all your dreams come true!</p>
                    <label for="c5" onclick="location.reload()">Finish 🎉</label>
                </div>
            </div>
            <div class="back">
                <img src="Tor.jpg">
            </div>
        </div>

    </div>
</div>

<audio id="myAudio" loop>
  <source src="Sister_brother.mp3" type="audio/mpeg">
</audio>

<script>
  // Mobile browsers security ke liye pehle click par music allow karte hain
  document.body.addEventListener('click', function() {
    var audio = document.getElementById('myAudio');
    if (audio.paused) {
        audio.play().catch(function(error) {
            console.log("Music play failed:", error);
        });
    }
  }, {once: true}); 
</script>

</body>
</html>
